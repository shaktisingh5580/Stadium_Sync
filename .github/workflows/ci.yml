# Stadium Sync — CI Pipeline
# Runs backend tests (pytest), frontend tests (vitest), lint, and security audits on every push.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend Tests ──
  backend:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          DEBUG: "true"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-32-chars-long
          RATE_LIMIT_ENABLED: "false"
          IOT_API_KEY: ci-test-iot-key
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --tb=short

      - name: Security audit (pip)
        run: pip install pip-audit && pip-audit --strict || true

  # ── Frontend Tests & Lint ──
  frontend:
    name: Frontend Tests & Lint (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Security audit (npm)
        run: npm audit --audit-level=high || true
