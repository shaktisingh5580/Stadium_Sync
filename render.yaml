# ── Stadium Sync — Render Blueprint (Infrastructure as Code) ──
# Deploy both backend and frontend with a single `render.yaml`.
# Docs: https://docs.render.com/infrastructure-as-code
#
# Usage:
#   1. Push this file to your GitHub repo
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo → Render auto-discovers this file
#   4. Set environment variables in the Render dashboard

services:
  # ── Backend API (FastAPI + Docker) ──
  - type: web
    name: stadium-sync-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./stadium_sync.db"
      - key: SECRET_KEY
        generateValue: true
      - key: TICKET_QR_SIGNING_KEY
        generateValue: true
      - key: IOT_API_KEY
        generateValue: true
      - key: GEMINI_API_KEY_1
        sync: false  # Set manually in Render dashboard
      - key: CORS_ORIGINS
        value: '["https://stadium-sync.vercel.app","https://stadium-sync-frontend.onrender.com","http://localhost:5173"]'

  # ── Frontend (React + Vite — Static Site) ──
  - type: web
    name: stadium-sync-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    region: oregon
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://stadium-sync-api.onrender.com/api/v1
