# ── Render Deployment Blueprint ──
# Deploy: Connect GitHub repo → Render auto-detects this file

services:
  # ── Backend API ──
  - type: web
    name: stadium-sync-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/stadium-sync
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter  # $7/month — upgrade for production
    region: oregon
    branch: main
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true  # Render generates a random secret
      - key: DATABASE_URL
        fromDatabase:
          name: stadium-sync-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: stadium-sync-cache
          type: redis
          property: connectionURI
      - key: GEMINI_API_KEY_1
        sync: false  # Set manually in Render dashboard
      - key: TICKET_QR_SIGNING_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://stadium-sync.vercel.app"]'
      - key: IOT_API_KEY
        generateValue: true

  # ── Redis Cache ──
  - type: redis
    name: stadium-sync-cache
    plan: starter  # Free tier
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Render internal only

# ── PostgreSQL Database ──
databases:
  - name: stadium-sync-db
    plan: starter  # Free tier (256MB, 1GB storage)
    region: oregon
    databaseName: stadium_sync
    user: stadium
